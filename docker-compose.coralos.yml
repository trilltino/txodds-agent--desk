# CoralOS Console bootstrap.
#
# This brings up ONLY the coral-server (a single container) so the CoralOS
# Console lights up on every `just dev`, on any machine. The 9 named
# participants are NOT run as containers: the Rust runtime is the brain and
# publishes their real transcript through coral-server's puppet API, and the
# session is created in devmode so coral-server never tries to spawn them.
#
# The only per-PC requirement is Docker itself (to run this one container).
# There are NO per-agent images to build.
#
# Override the image or expose a build context by setting CORAL_SERVER_IMAGE
# (and CORAL_SERVER_BUILD) in your .env before `just dev`.

services:
  coral-server:
    image: ${CORAL_SERVER_IMAGE:-ghcr.io/coral-protocol/coral-server:latest}
    container_name: coralos-server
    ports:
      - "5555:5555"
    environment:
      CORAL_TOKEN: ${CORAL_TOKEN:-dev}
      CORALOS_NAMESPACE: ${CORALOS_NAMESPACE:-default}
    restart: unless-stopped
    healthcheck:
      # coral-server serves its Console UI at /ui/console; a 2xx/3xx/4xx here
      # means the HTTP listener is up and ready to accept session requests.
      # The image (Ubuntu 24.04) ships neither wget nor curl, so this uses
      # bash's built-in /dev/tcp instead of an external HTTP client.
      # CMD-SHELL runs /bin/sh (dash, no /dev/tcp support), so bash must be
      # invoked explicitly.
      test: ["CMD-SHELL", "bash -c \"exec 3<>/dev/tcp/localhost/5555 && printf 'GET /ui/console HTTP/1.0\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q ' 200 '\""]
      interval: 3s
      timeout: 2s
      retries: 15
      start_period: 5s
