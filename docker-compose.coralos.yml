# CoralOS Console bootstrap.
#
# Every named participant is a real, coral-server-spawned Docker container —
# discovered via `[registry] localAgents` in coral/coral.toml (mounted
# below) and launched through the mounted Docker socket, the same mechanism
# the `pay` project's real buyer/seller/verifier agents use. There is no
# "devmode"/non-spawned registration in real CoralOS (its RuntimeId enum has
# no such value — confirmed by decompiling a live server), so even the two
# identities that are legitimately self/human-narrated
# (`match-intelligence-agent`, `user-proxy`) are real, idling containers
# (crates/agents/idle-agent) that the puppet API posts to, not fake
# unspawned registrations.
#
# Build every image once before starting a round:
#   docker build -f crates/agents/proof-guard-agent/Dockerfile   -t proof-guard-agent:0.1.0   .
#   docker build -f crates/agents/settlement-agent/Dockerfile    -t settlement-agent:0.1.0    .
#   docker build -f crates/agents/trading-specialist/Dockerfile  -t trading-specialist:0.1.0  .
#   docker build -f crates/agents/fan-pundit-agent/Dockerfile    -t fan-pundit-agent:0.1.0    .
#   docker build -f crates/agents/idle-agent/Dockerfile          -t idle-agent:0.1.0          .
#   docker build -f crates/agents/contrarian/Dockerfile          -t contrarian:0.1.0          .
#   docker build -f crates/agents/arena-coordinator/Dockerfile   -t arena-coordinator:0.1.0   .
#
# Override the image or expose a build context by setting CORAL_SERVER_IMAGE
# (and CORAL_SERVER_BUILD) in your .env before `just dev`.

services:
  coral-server:
    image: ${CORAL_SERVER_IMAGE:-ghcr.io/coral-protocol/coral-server:latest}
    container_name: coralos-server
    ports:
      - "5555:5555"
    environment:
      CORAL_TOKEN: ${CORAL_TOKEN:-dev}
      CORALOS_NAMESPACE: ${CORALOS_NAMESPACE:-default}
      CONFIG_FILE_PATH: /config/coral.toml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./coral/coral.toml:/config/coral.toml:ro
      - ./crates/agents:/agents:ro
    restart: unless-stopped
    healthcheck:
      # coral-server serves its Console UI at /ui/console; a 2xx/3xx/4xx here
      # means the HTTP listener is up and ready to accept session requests.
      # The image (Ubuntu 24.04) ships neither wget nor curl, so this uses
      # bash's built-in /dev/tcp instead of an external HTTP client.
      # CMD-SHELL runs /bin/sh (dash, no /dev/tcp support), so bash must be
      # invoked explicitly.
      test: ["CMD-SHELL", "bash -c \"exec 3<>/dev/tcp/localhost/5555 && printf 'GET /ui/console HTTP/1.0\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q ' 200 '\""]
      interval: 3s
      timeout: 2s
      retries: 15
      start_period: 5s
