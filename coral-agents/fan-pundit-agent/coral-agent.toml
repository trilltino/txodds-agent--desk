edition = 4

[agent]
name = "fan-pundit-agent"
version = "0.1.0"
description = "TxODDS fan-track narrative agent. Receives Fan-track handoffs from match-intelligence-agent and surfaces the Venice LLM explanation as a fan-friendly commentary package."
summary = "Fan-track match intelligence narrator — LLM explanation, no financial decisions."
readme = "The Docker participant connects to CoralOS and idles. The Rust desktop runtime publishes fan narrative messages (generated by the Venice LLM client) as this agent through the CoralOS puppet API."

[agent.license]
type = "spdx"
expression = "MIT"

[runtimes.docker]
image = "fan-pundit-agent:0.1.0"

[desktop]
mode = "rust"
transport = "coralos-puppet"
trace_event = "agent://trace"
coral_event = "coral://message"

[policy]
allow_money_decisions = false
allow_proof_verdicts = false
allow_settlement_release = false
default_action = "narrate"

[tools]
llm_explainer = "services::llm"
features = "services::agent::features"
