edition = 4

[agent]
name = "proof-guard-agent"
version = "0.1.0"
description = "TxODDS txoracle proof-gate participant. Validates TxLINE event proofs via the Rust txoracle bridge before any settlement or decision is cleared."
summary = "Read-only txoracle validation gate. Blocks settlement until proof is verified."
readme = "The Docker participant connects to CoralOS and idles. The Rust desktop runtime publishes proof-gate decisions (ProofReceived, ValidationSimulated, Verified) as this agent through the CoralOS puppet API."

[agent.license]
type = "spdx"
expression = "MIT"

[runtimes.docker]
image = "proof-guard-agent:0.1.0"

[desktop]
mode = "rust"
transport = "coralos-puppet"
trace_event = "agent://trace"
coral_event = "coral://message"

[policy]
allow_money_decisions = false
allow_proof_verdicts = true
allow_settlement_release = false
default_action = "validate"

[tools]
proof_gate = "services::proof"
txoracle_bridge = "services::proof::validation_bridge"
